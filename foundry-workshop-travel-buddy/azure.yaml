# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: foundry-workshop-travel-buddy
services:
    foundry-workshop-travel-buddy:
        project: src/foundry-workshop-travel-buddy
        host: azure.ai.agent
        language: python
        uses:
            - gpt5project2820
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: |
            TravelBuddy is an Agent Framework hosted agent with local Python function tools for weather, local time, and currency, plus an OctoTrip Flights MCP connection for live flight search.
        environmentVariables:
            - name: AZURE_AI_PROJECT_ENDPOINT
              value: ${AZURE_AI_PROJECT_ENDPOINT}
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: WORKSHOP_RESOURCE_PREFIX
              value: ${WORKSHOP_RESOURCE_PREFIX}
            - name: MCP_SERVER_LABEL
              value: ${MCP_SERVER_LABEL}
            - name: MCP_SERVER_URL
              value: ${MCP_SERVER_URL}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - AI Agent Hosting
                - Azure AI AgentServer
                - Responses Protocol
                - Travel Assistant
                - Function Tools
                - MCP Tools
        name: foundry-workshop-travel-buddy
        protocols:
            - protocol: responses
              version: 2.0.0
    gpt5project2820:
        host: azure.ai.project
        endpoint: https://gpt5aifoundry2820.services.ai.azure.com/api/projects/gpt5project2820
infra:
    provider: microsoft.foundry
